<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sanctuary</title>
    <style>
      :root {
        --bg: #141c1a;
        --mid: #1f2a27;
        --ink: #f3e8d8;
        --muted: #b9a992;
        --amber: #d4a574;
        --rose: #c4786a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Iowan Old Style", "Palatino Linotype", Palatino, serif;
        color: var(--ink);
        background:
          radial-gradient(900px 500px at 10% 10%, rgba(212,165,116,0.18), transparent 55%),
          radial-gradient(800px 500px at 90% 80%, rgba(196,120,106,0.16), transparent 50%),
          linear-gradient(165deg, var(--bg), var(--mid) 55%, #24352e);
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main { max-width: 34rem; }
      h1 {
        font-weight: 500;
        font-size: clamp(2.8rem, 8vw, 4.5rem);
        letter-spacing: 0.12em;
        color: #e6c48a;
        margin: 0 0 0.75rem;
      }
      p { line-height: 1.6; color: var(--muted); }
      code {
        color: var(--amber);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.92em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sanctuary</h1>
      <p>A private sacred space for two. The mobile app lives in <code>apps/sanctuary</code>. Run <code>npm install && npm run mobile</code>.</p>
      <p>No ads. No analytics. End-to-end encrypted devotion.</p>
    </main>
  </body>
</html>
